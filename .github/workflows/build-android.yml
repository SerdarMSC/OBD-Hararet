name: Build Android APK

# Runs on every push to main, and can also be triggered manually from the
# Actions tab ("Run workflow" button). This builds a standalone, installable
# APK directly with Gradle — it does not use EAS Build at all, so it is not
# affected by Expo's EAS Build quota.
on:
  push:
    branches: [Native]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Install required Android NDK
        run: $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;27.1.12297006" "cmake;3.22.1"

      - name: Set version code from build number
        # Every workflow run gets a unique, always-increasing number from
        # GitHub (${{ github.run_number }}). Writing it into app.json's
        # android.versionCode means each auto-built APK gets a distinct,
        # traceable build number automatically — no manual editing needed.
        run: |
          node -e "
            const fs = require('fs');
            const path = 'app.json';
            const config = JSON.parse(fs.readFileSync(path, 'utf8'));
            config.expo.android.versionCode = ${{ github.run_number }};
            fs.writeFileSync(path, JSON.stringify(config, null, 2) + '\n');
            console.log('versionCode set to ${{ github.run_number }}');
          "

      - name: Run Expo prebuild (generate native android project)
        run: npx expo prebuild --platform android --no-install
        env:
          NODE_ENV: production

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build release APK
        # -PreactNativeArchitectures restricts which CPU architectures the
        # native modules (reanimated, worklets, etc.) actually build native
        # code for. Without this, every native module builds+bundles for
        # all 4 architectures (arm64-v8a, armeabi-v7a, x86, x86_64), which
        # is the main reason the APK was ~90MB. Real phones since ~2017 are
        # arm64-v8a, so this alone cuts the APK to roughly a quarter of the
        # size with no functional risk.
        run: ./gradlew assembleRelease -PreactNativeArchitectures=arm64-v8a
        working-directory: android
        env:
          NODE_ENV: production

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: obd-hararet-apk-build${{ github.run_number }}
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
